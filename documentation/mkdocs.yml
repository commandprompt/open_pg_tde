# MkDocs general configuration

site_name: open_pg_tde - Transparent Data Encryption for PostgreSQL
site_description: Documentation
site_author: Command Prompt, Inc.
copyright: >
  <a href="https://www.commandprompt.com/">Command Prompt, Inc.</a> © 2026

repo_name: commandprompt/open_pg_tde
repo_url: https://github.com/commandprompt/open_pg_tde
edit_uri: edit/main/documentation/docs

use_directory_urls: false

# Brand-asset folder READMEs are reference material, not site pages.
exclude_docs: |
  _images/open_pg_tde-logo/README.md

# Theme settings
theme:
  name: material
  logo: _images/open_pg_tde-logo/mark/icon-color.svg
  favicon: _images/open_pg_tde-logo/favicon/favicon.svg
  font:
    text: Work Sans
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Color theme set to Automatic. Click to change
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Color theme set to Light Mode. Click to change
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Color theme set to Dark Mode. Click to change

# Theme features

  features:
    - search.share
    - search.highlight
    - content.code.copy
    - content.action.view
#    - content.action.edit
    - content.tabs.link
    - navigation.top
    - navigation.tracking
    - navigation.indexes

extra_css:
  - https://unicons.iconscout.com/release/v3.0.3/css/line.css
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.4.0/css/font-awesome.min.css
  - css/extra.css
  - css/design.css
  - css/postgresql.css
  - css/rating.css
  - css/commandprompt.css

extra_javascript:
  - js/version-select.js
  - js/promptremover.js
  - js/rating.js

markdown_extensions:
  - attr_list
  - toc:
      permalink: True
  - admonition
  - md_in_html
  - footnotes
  - def_list   # https://michelf.ca/projects/php-markdown/extra/#def-list
  - meta
  - smarty:
      smart_angled_quotes: true
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.highlight:
      linenums: false
  - pymdownx.snippets:
      base_path: ["snippets"]
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
         - _resource/.icons

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - open-in-new-tab:
  - git-revision-date-localized:
      enable_creation_date: true
      enabled: !ENV [ENABLED_GIT_REVISION_DATE, True]
  - meta-descriptions:
      export_csv: false
      quiet: false
      enable_checks: false
      min_length: 50
      max_length: 160
  - section-index # Adds links to nodes - comment out when creating PDF
#  - htmlproofer # Uncomment to check links - but extends build time significantly
  - glightbox
  - macros:
      include_yaml:
        - 'variables.yml' # Use in markdown as '{{ VAR }}'
  - print-site:
      add_to_navigation: false
      print_page_title: 'open_pg_tde documentation'
      add_print_site_banner: false
      # Table of contents
      add_table_of_contents: true
      toc_title: 'Table of Contents'
      toc_depth: 2
      # Content-related
      add_full_urls: false
      enumerate_headings: false
      enumerate_headings_depth: 1
      enumerate_figures: true
      add_cover_page: true
      cover_page_template: "docs/templates/pdf_cover_page.tpl"
      path_to_pdf: ""
      include_css: true
      enabled: true

extra:
  version:
    provider: mike
  analytics:
    provider: google
    property: G-J4J70BNH0G

